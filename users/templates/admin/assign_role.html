{% extends 'base.html' %}
{% block title %}Assign role — TaskPro{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto my-6">
  <div class="glass-card p-8 fadeUp">
    <h1 class="text-2xl font-extrabold mb-1">Assign role</h1>
    <p class="text-ink-600 mb-6">Move a user into a group to grant permissions.</p>
    <form method="post" class="space-y-4">{% csrf_token %}
      <div>
        <label class="text-sm font-semibold">User</label>
        <select class="select mt-1" name="user_id" required>
          <option value="">Select user…</option>
          {% for u in users %}<option value="{{ u.id }}" {% if request.GET.user|stringformat:"s" == u.id|stringformat:"s" %}selected{% endif %}>{{ u.username }} — {{ u.email }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="text-sm font-semibold">Group</label>
        <select class="select mt-1" name="group_id" required>
          <option value="">Select group…</option>
          {% for g in groups %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}
        </select>
      </div>
      {% if messages %}{% for m in messages %}<div class="alert alert-{{ m.tags|default:'info' }}">{{ m }}</div>{% endfor %}{% endif %}
      <div class="flex gap-2 justify-end">
        <a class="btn-ghost" href="{% url 'admin_dashboard' %}">Cancel</a>
        <button class="btn-primary" type="submit">Assign</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
