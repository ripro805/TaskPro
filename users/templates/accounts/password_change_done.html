{% extends "base.html" %}

{% block title %}Password Changed - TaskPro{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-100 py-12">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8 text-center">
        <div class="mb-6">
            <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Password Changed Successfully!</h2>
            <p class="text-gray-600">Your password has been updated successfully.</p>
        </div>
        
        <div class="space-y-4">
            <a href="{% url 'profile' %}" 
               class="block w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200">
                Back to Profile
            </a>
            <a href="{% url 'home' %}" 
               class="block w-full bg-gray-300 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 transition duration-200">
                Go to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
