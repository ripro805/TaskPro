<!doctype html>
<html><body style="font-family:Inter,Arial,sans-serif;background:#f8fafc;padding:24px;">
<div style="max-width:560px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(15,23,42,0.08);">
  <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:28px;color:white;">
    <h1 style="margin:0;font-family:'Plus Jakarta Sans',Inter,Arial,sans-serif;">Welcome to TaskPro</h1>
  </div>
  <div style="padding:28px;color:#0f172a;">
    <p>Hi {{ user.username }},</p>
    <p>Thanks for signing up! Click the button below to activate your account and start managing your work like a pro.</p>
    <p style="text-align:center;margin:28px 0;">
      <a href="{{ activation_link }}" style="background:#6366f1;color:white;text-decoration:none;padding:12px 22px;border-radius:10px;font-weight:600;">Activate my account</a>
    </p>
    <p style="color:#64748b;font-size:13px;">If the button doesn't work, paste this link:<br /><span style="word-break:break-all;">{{ activation_link }}</span></p>
    <p>— The TaskPro team</p>
  </div>
</div>
</body></html>
