{% extends 'base.html' %}
{% block title %}Change password — TaskPro{% endblock %}
{% block content %}
<div class="max-w-md mx-auto my-12">
  <div class="glass-card p-8 fadeUp">
    <h1 class="text-2xl font-extrabold mb-1">Change password</h1>
    <p class="text-ink-600 mb-6">Enter your current password and a new one.</p>
    <form method="post" class="space-y-4">{% csrf_token %}
      <div><label class="text-sm font-semibold">Current password</label><input class="input mt-1" name="old_password" type="password" required /></div>
      <div><label class="text-sm font-semibold">New password</label><input class="input mt-1" name="new_password1" type="password" required /></div>
      <div><label class="text-sm font-semibold">Confirm new password</label><input class="input mt-1" name="new_password2" type="password" required /></div>
      {% if form.errors %}<div class="alert alert-danger">{{ form.errors }}</div>{% endif %}
      <div class="flex gap-2 justify-end"><a class="btn-ghost" href="{% url 'profile' %}">Cancel</a><button class="btn-primary" type="submit">Update password</button></div>
    </form>
  </div>
</div>
{% endblock %}
