{% extends 'base.html' %}
{% block title %}Edit profile — TaskPro{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto my-6">
  <div class="glass-card p-8 fadeUp">
    <h1 class="text-2xl font-extrabold mb-1">Edit profile</h1>
    <p class="text-ink-600 mb-6">Update your personal information.</p>
    <form method="post" enctype="multipart/form-data" class="space-y-4">{% csrf_token %}
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-sm font-semibold">First name</label><input class="input mt-1" name="first_name" value="{{ form.first_name.value|default_if_none:'' }}" /></div>
        <div><label class="text-sm font-semibold">Last name</label><input class="input mt-1" name="last_name" value="{{ form.last_name.value|default_if_none:'' }}" /></div>
      </div>
      <div><label class="text-sm font-semibold">Email</label><input class="input mt-1" name="email" type="email" value="{{ form.email.value|default_if_none:'' }}" required /></div>
      <div><label class="text-sm font-semibold">Bio</label><textarea class="textarea mt-1" name="bio" rows="4">{{ form.bio.value|default_if_none:'' }}</textarea></div>
      <div>
        <label class="text-sm font-semibold">Profile picture</label>
        <input class="input mt-1" type="file" name="profile_picture" accept="image/*" />
      </div>
      {% if form.errors %}<div class="alert alert-danger">{{ form.errors }}</div>{% endif %}
      <div class="flex gap-2 justify-end">
        <a class="btn-ghost" href="{% url 'profile' %}">Cancel</a>
        <button class="btn-primary" type="submit">Save changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
