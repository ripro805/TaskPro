{% extends 'base.html' %}
{% block title %}Reset password — TaskPro{% endblock %}
{% block content %}
<div class="max-w-md mx-auto my-12">
  <div class="glass-card p-8 fadeUp">
    <h1 class="text-2xl font-extrabold mb-1">Forgot your password?</h1>
    <p class="text-ink-600 mb-6">Enter your email and we will send reset instructions.</p>
    <form method="post" class="space-y-4">{% csrf_token %}
      <div><label class="text-sm font-semibold">Email</label><input class="input mt-1" name="email" type="email" required /></div>
      <button class="btn-primary w-full" type="submit">Send reset link</button>
    </form>
  </div>
</div>
{% endblock %}
